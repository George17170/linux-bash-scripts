name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh tests/test_scripts.sh

      - name: Run test suite
        run: bash tests/test_scripts.sh

      - name: Shellcheck lint
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning
